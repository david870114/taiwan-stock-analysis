name: Update Institutional Data

on:
  schedule:
    # 每日台灣時間 17:00 執行（UTC 09:00），收盤後抓取
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer@22

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libcairo2 || true

      - name: Run scraper
        env:
          CI: true
        run: |
          node scripts/scrape_institutional.mjs
        timeout-minutes: 5

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add institutional_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 更新法人動態資料 $(date -u '+%Y-%m-%d')"
            git push
          fi
