name = "my-stocks-api"
main = "src/index.js"
compatibility_date = "2026-07-01"

# 台北交易時段 09:00–13:30（UTC 01:00–05:30）每 30 分鐘檢查一次到價，僅平日
[triggers]
crons = ["*/30 1-5 * * 1-5"]

# 部署前先建立 KV：npx wrangler kv namespace create MYSTOCKS
# 再把回傳的 id 填到下面
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_ID"

# 機密（部署後執行）：
# npx wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
